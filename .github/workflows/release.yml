name: Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  # ── 1. Bump version, commit, push, annotated tag ──────────────────────
  bump-and-tag:
    if: >
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'cargo:patch') ||
        contains(github.event.pull_request.labels.*.name, 'cargo:minor') ||
        contains(github.event.pull_request.labels.*.name, 'cargo:major')
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Determine release type from label
        id: release-type
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'cargo:major') }}; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'cargo:minor') }}; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in Cargo.toml
        id: bump
        run: |
          CURRENT_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          BUMP_TYPE="${{ steps.release-type.outputs.type }}"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml

          cargo update

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${VERSION}"
          git tag -a "v${VERSION}" -m "release: v${VERSION}"

      - name: Push version bump and tag
        run: git push --follow-tags origin main

  # ── 2. Publish to crates.io ───────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [bump-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ] && grep -q "already exists on crates.io" /tmp/publish.log; then
            echo "Already published — skipping"
            exit 0
          fi
          exit "$status"

  # ── 3. Create the GitHub release ──────────────────────────────────────
  create-release:
    name: Create GitHub release
    needs: [bump-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.bump-and-tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
